services:
  # ── Base de datos ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: docmind_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmind_user
      POSTGRES_PASSWORD: docmind_pass_2026
      POSTGRES_DB: docmind_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmind_user -d docmind_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Almacenamiento de archivos ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: docmind_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: docmind_minio
      MINIO_ROOT_PASSWORD: docmind_minio_2026
      MINIO_SERVER_URL: "http://localhost:9000"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docmind_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://docmind_user:docmind_pass_2026@db:5432/docmind_db
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Frontend React ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docmind_frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
